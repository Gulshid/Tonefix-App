name: tonefix
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ─── State Management ───────────────────────────────────────────
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # ─── Responsive / UI ────────────────────────────────────────────
  flutter_screenutil: ^5.9.3
  gap: ^3.0.1

  # ─── AI (Gemini — free tier, no Blaze required) ─────────────────
  google_generative_ai: ^0.4.6

  # ─── Firebase ───────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # ─── Local Storage ──────────────────────────────────────────────
  shared_preferences: ^2.3.2
  hive_flutter: ^1.1.0

  # ─── Dependency Injection ───────────────────────────────────────
  get_it: ^8.0.2

  # ─── Navigation ─────────────────────────────────────────────────
  go_router: ^14.3.0

  # ─── Clipboard / Share ──────────────────────────────────────────
  share_plus: ^10.0.2
  clipboard: ^0.1.3

  # ─── Animations ─────────────────────────────────────────────────
  flutter_animate: ^4.5.0
  lottie: ^3.1.2

  # ─── Utils ──────────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.5.1
  logger: ^2.4.0

  # dotenv
  flutter_dotenv: ^5.1.0  

  # speach to text
  speech_to_text: ^7.0.0

  # graphs / charts
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_launcher_icons: ^0.13.1


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#164957"   # ← adds Android adaptive icon with your brand color
  adaptive_icon_foreground: "assets/images/logo.png"
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#164957"
    theme_color: "#164957"
  windows:
    generate: true
    image_path: "assets/images/logo.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/images/logo.png"
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0


flutter:

  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/fonts/
    - assets/lottie/




  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
